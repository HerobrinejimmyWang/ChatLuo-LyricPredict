<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5B6770"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA8C00"/>
    </marker>
    <filter id="shadow" x="-2" y="-2" width="8" height="8">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="header-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
    <linearGradient id="header-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#2D8F47"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="960" fill="#F7F8FA" rx="12"/>

  <!-- 标题 -->
  <text x="700" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1F1F1F">LyricPredict — 两条链路流程图</text>

  <!-- ============ 左侧：训练链路（离线） ============ -->
  <rect x="28" y="14" width="660" height="930" fill="none" stroke="#4A90D9" stroke-width="2" rx="10" stroke-dasharray="6,3"/>
  <rect x="28" y="14" width="660" height="36" fill="url(#header-left)" rx="10"/>
  <rect x="28" y="36" width="660" height="14" fill="url(#header-left)"/>
  <text x="358" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#FFF">训练链路（离线 — 一次性）</text>

  <!-- 1. 原始歌词文件 -->
  <rect x="120" y="70" width="220" height="48" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">raw_dir/*.txt / *.lrc</text>

  <line x1="230" y1="118" x2="230" y2="148" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. 清洗与切分 -->
  <rect x="80" y="150" width="300" height="72" rx="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">importer.py + cleaner.py</text>
  <text x="230" y="194" text-anchor="middle" font-size="11" fill="#555">去除 LRC 时间轴、元数据行</text>
  <text x="230" y="210" text-anchor="middle" font-size="11" fill="#555">清洗标点、按 ratio 切分 train/valid</text>

  <line x1="230" y1="222" x2="230" y2="252" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. processed_dir -->
  <rect x="90" y="254" width="280" height="78" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">processed_dir/</text>
  <text x="230" y="296" text-anchor="middle" font-size="11" fill="#555">├─ songs.jsonl（行级结构保留）</text>
  <text x="230" y="312" text-anchor="middle" font-size="11" fill="#555">├─ train.txt / valid.txt</text>
  <text x="230" y="328" text-anchor="middle" font-size="11" fill="#555">└─ stats.json</text>

  <!-- 分叉箭头 -->
  <line x1="230" y1="332" x2="230" y2="360" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="230" y1="360" x2="120" y2="360" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="120" y1="360" x2="120" y2="388" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="230" y1="360" x2="340" y2="360" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="340" y1="360" x2="340" y2="388" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 标签 -->
  <text x="120" y="352" text-anchor="middle" font-size="10" fill="#888">路径 1</text>
  <text x="340" y="352" text-anchor="middle" font-size="10" fill="#888">路径 2</text>

  <!-- 4. Transformer 训练 -->
  <rect x="40" y="390" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="414" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">train.py</text>
  <text x="120" y="434" text-anchor="middle" font-size="11" fill="#555">TextBlockDataset</text>
  <text x="120" y="450" text-anchor="middle" font-size="11" fill="#555">tokenizer.encode</text>
  <text x="120" y="466" text-anchor="middle" font-size="11" fill="#555">HuggingFace Trainer</text>
  <text x="120" y="482" text-anchor="middle" font-size="11" fill="#555">+ LoRA（可选）</text>

  <line x1="120" y1="480" x2="120" y2="510" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. N-Gram 训练 -->
  <rect x="260" y="390" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#EA8C00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="414" text-anchor="middle" font-size="13" font-weight="600" fill="#EA8C00">ngram_model.py</text>
  <text x="340" y="434" text-anchor="middle" font-size="11" fill="#555">CharNGramModel.train()</text>
  <text x="340" y="450" text-anchor="middle" font-size="11" fill="#555">滑动窗口统计</text>
  <text x="340" y="466" text-anchor="middle" font-size="11" fill="#555">字符级转移概率</text>
  <text x="340" y="482" text-anchor="middle" font-size="11" fill="#555">order=16</text>

  <line x1="340" y1="480" x2="340" y2="510" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. 模型产物 -->
  <rect x="60" y="512" width="300" height="78" rx="8" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#1A1A1A">model_dir/</text>
  <text x="210" y="554" text-anchor="middle" font-size="11" fill="#555">├─ (adapter_config.json / config.json) — Transformer 模型</text>
  <text x="210" y="570" text-anchor="middle" font-size="11" fill="#555">├─ ngram_model.json — N-Gram 后备</text>
  <text x="210" y="586" text-anchor="middle" font-size="11" fill="#555">└─ confidence.json（校准后写入）</text>

  <!-- 从 train.txt 到 calibrate 的箭头 -->
  <line x1="230" y1="332" x2="480" y2="332" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="480" y1="332" x2="480" y2="512" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. 置信度校准 -->
  <rect x="410" y="512" width="160" height="78" rx="8" fill="#FFFFFF" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#7B61FF">calibrate.py（可选）</text>
  <text x="490" y="554" text-anchor="middle" font-size="11" fill="#555">用 valid.txt 做推理</text>
  <text x="490" y="570" text-anchor="middle" font-size="11" fill="#555">收集置信度分数</text>
  <text x="490" y="586" text-anchor="middle" font-size="11" fill="#555">自动计算阈值</text>

  <line x1="410" y1="551" x2="360" y2="551" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 右侧：推理链路（在线） ============ -->
  <rect x="712" y="14" width="660" height="930" fill="none" stroke="#34A853" stroke-width="2" rx="10" stroke-dasharray="6,3"/>
  <rect x="712" y="14" width="660" height="36" fill="url(#header-right)" rx="10"/>
  <rect x="712" y="36" width="660" height="14" fill="url(#header-right)"/>
  <text x="1042" y="38" text-anchor="middle" font-size="15" font-weight="600" fill="#FFF">推理链路（在线 — 每次请求）</text>

  <!-- 用户输入 -->
  <rect x="840" y="70" width="220" height="44" rx="22" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="950" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#1A1A1A">用户输入上下文</text>

  <line x1="950" y1="114" x2="950" y2="144" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- context extraction -->
  <rect x="850" y="146" width="220" height="50" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="960" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#34A853">context.py</text>
  <text x="960" y="186" text-anchor="middle" font-size="11" fill="#555">extract_lyric_context()</text>

  <line x1="960" y1="196" x2="960" y2="226" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 路由决策 -->
  <polygon points="960,228 1050,265 960,302 870,265" fill="#FFF3CD" stroke="#EA8C00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="960" y="262" text-anchor="middle" font-size="13" font-weight="600" fill="#D68A00">mode=?</text>
  <text x="960" y="280" text-anchor="middle" font-size="10" fill="#D68A00">auto / retrieval / model-only</text>

  <!-- retrieval 分支 -->
  <line x1="1050" y1="265" x2="1140" y2="265" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="1140" y1="265" x2="1140" y2="300" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1150" y="258" font-size="10" fill="#888">yes</text>

  <rect x="1050" y="302" width="180" height="50" rx="8" fill="#FFFFFF" stroke="#34A853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1140" y="324" text-anchor="middle" font-size="13" font-weight="600" fill="#34A853">LyricRetriever</text>
  <text x="1140" y="342" text-anchor="middle" font-size="11" fill="#555">模糊后缀匹配 + 编辑距离</text>

  <line x1="1140" y1="352" x2="1140" y2="382" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 检索结果判定 -->
  <polygon points="1140,384 1210,414 1140,444 1070,414" fill="#FFF3CD" stroke="#EA8C00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1140" y="412" text-anchor="middle" font-size="11" font-weight="600" fill="#D68A00">有结果?</text>

  <!-- 检索成功 -->
  <line x1="1210" y1="414" x2="1280" y2="414" stroke="#34A853" stroke-width="1.5"/>
  <line x1="1280" y1="414" x2="1280" y2="560" stroke="#34A853" stroke-width="1.5"/>
  <text x="1290" y="408" font-size="10" fill="#34A853">yes</text>

  <rect x="1220" y="560" width="120" height="40" rx="20" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1280" y="580" text-anchor="middle" font-size="13" font-weight="600" fill="#2D8F47">返回 ✅</text>
  <text x="1280" y="594" text-anchor="middle" font-size="10" fill="#555">confidence=0.92</text>

  <!-- 检索失败 → fallback -->
  <line x1="1070" y1="414" x2="960" y2="414" stroke="#EA8C00" stroke-width="1.5"/>
  <line x1="960" y1="414" x2="960" y2="450" stroke="#EA8C00" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1040" y="432" text-anchor="middle" font-size="10" fill="#EA8C00">no / mode=auto</text>

  <!-- fallback 决策 -->
  <polygon points="960,452 1030,482 960,512 890,482" fill="#FFF3CD" stroke="#EA8C00" stroke-width="1.5"/>
  <text x="960" y="480" text-anchor="middle" font-size="11" font-weight="600" fill="#D68A00">fallback?</text>

  <line x1="890" y1="482" x2="840" y2="482" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="840" y1="482" x2="840" y2="590" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="850" y="476" font-size="10" fill="#888">no（retrieval 模式）</text>

  <rect x="770" y="590" width="140" height="40" rx="20" fill="#FDE8E8" stroke="#E55050" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="840" y="610" text-anchor="middle" font-size="13" font-weight="600" fill="#C53030">返回空 ❌</text>
  <text x="840" y="624" text-anchor="middle" font-size="10" fill="#555">no_retrieval_match</text>

  <!-- yes → ngram -->
  <line x1="1030" y1="482" x2="1140" y2="482" stroke="#EA8C00" stroke-width="1.5"/>
  <line x1="1140" y1="482" x2="1140" y2="560" stroke="#EA8C00" stroke-width="1.5"/>
  <text x="1150" y="476" font-size="10" fill="#EA8C00">yes（auto / model-only）</text>

  <!-- n-gram 模型 -->
  <line x1="1140" y1="482" x2="1140" y2="510" stroke="#5B6770" stroke-width="1.5"/>
  <rect x="780" y="512" width="180" height="56" rx="8" fill="#FFFFFF" stroke="#EA8C00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="870" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#EA8C00">CharNGramModel.predict()</text>
  <text x="870" y="552" text-anchor="middle" font-size="11" fill="#555">逐字生成 → 到句号停止</text>
  <text x="870" y="562" text-anchor="middle" font-size="10" fill="#888">模糊匹配后备（编辑距离）</text>

  <line x1="960" y1="568" x2="960" y2="598" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ngram 结果判定 -->
  <polygon points="960,600 1030,630 960,660 890,630" fill="#FFF3CD" stroke="#EA8C00" stroke-width="1.5"/>
  <text x="960" y="628" text-anchor="middle" font-size="11" font-weight="600" fill="#D68A00">有结果</text>
  <text x="960" y="642" text-anchor="middle" font-size="10" fill="#D68A00">且通过置信度?</text>

  <!-- ngram 通过 -->
  <line x1="1030" y1="630" x2="1200" y2="630" stroke="#34A853" stroke-width="1.5"/>
  <line x1="1200" y1="630" x2="1200" y2="726" stroke="#34A853" stroke-width="1.5"/>
  <text x="1210" y="624" font-size="10" fill="#34A853">yes</text>

  <!-- ngram 拒绝 -->
  <line x1="890" y1="630" x2="780" y2="630" stroke="#5B6770" stroke-width="1.5"/>
  <line x1="780" y1="630" x2="780" y2="726" stroke="#5B6770" stroke-width="1.5"/>
  <text x="790" y="624" font-size="10" fill="#888">no</text>

  <!-- Transformer 分支 -->
  <rect x="740" y="728" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="840" y="750" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">Transformer 模型</text>
  <text x="840" y="768" text-anchor="middle" font-size="11" fill="#555">model.generate()</text>
  <text x="840" y="784" text-anchor="middle" font-size="11" fill="#555">do_sample=True / top_p / temperature</text>

  <line x1="840" y1="798" x2="840" y2="828" stroke="#5B6770" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 置信度门禁 -->
  <rect x="750" y="830" width="340" height="100" rx="8" fill="#FFFFFF" stroke="#7B61FF" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="920" y="852" text-anchor="middle" font-size="13" font-weight="600" fill="#7B61FF">ConfidenceGate.evaluate()</text>
  <text x="920" y="874" text-anchor="middle" font-size="11" fill="#555">├─ 无终止符 → reject</text>
  <text x="920" y="890" text-anchor="middle" font-size="11" fill="#555">├─ 子词碎片 / 重复率过高 → reject</text>
  <text x="920" y="906" text-anchor="middle" font-size="11" fill="#555">├─ 最小 token 概率过低 → reject</text>
  <text x="920" y="922" text-anchor="middle" font-size="11" fill="#555">└─ 综合置信度 &lt; 阈值 → reject</text>

  <!-- 门禁结果 -->
  <line x1="1090" y1="880" x2="1220" y2="880" stroke="#34A853" stroke-width="1.5"/>
  <line x1="1220" y1="880" x2="1220" y2="906" stroke="#34A853" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1230" y="874" font-size="10" fill="#34A853">通过</text>

  <rect x="1140" y="908" width="120" height="40" rx="20" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1200" y="928" text-anchor="middle" font-size="13" font-weight="600" fill="#2D8F47">返回 ✅</text>

  <line x1="840" y1="930" x2="750" y2="930" stroke="#E55050" stroke-width="1.5"/>
  <line x1="750" y1="930" x2="750" y2="906" stroke="#E55050" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="740" y="924" text-anchor="end" font-size="10" fill="#E55050">拒绝（重试）</text>

  <!-- 多次尝试标注 -->
  <text x="840" y="810" text-anchor="middle" font-size="10" fill="#888" font-style="italic">↑ generation_attempts 次重试 ↑</text>

  <!-- ============ 图例 ============ -->
  <rect x="28" y="620" width="660" height="100" rx="8" fill="#FFF" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="644" font-size="13" font-weight="600" fill="#1A1A1A">图例</text>
  <rect x="50" y="656" width="16" height="16" rx="3" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="76" y="670" font-size="11" fill="#555">数据/文件</text>
  <rect x="180" y="656" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="206" y="670" font-size="11" fill="#555">处理步骤</text>
  <polygon points="370,656 382,664 370,672 358,664" fill="#FFF3CD" stroke="#EA8C00" stroke-width="1.5"/>
  <text x="395" y="670" font-size="11" fill="#555">决策节点</text>
  <rect x="520" y="656" width="16" height="16" rx="8" fill="#E6F4EA" stroke="#34A853" stroke-width="1.5"/>
  <text x="546" y="670" font-size="11" fill="#555">终态</text>
  <text x="50" y="700" font-size="11" fill="#888">蓝色 = Transformer 路径 | 橙色 = N-Gram 路径 | 绿色 = 检索路径 | 紫色 = 置信度</text>
</svg>
